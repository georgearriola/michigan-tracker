<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Michigan Postseason Tracker 2026</title>
</head>
<body>

  <div class="container">
    <header>
      <div class="live-indicator">● LIVE UPDATES</div>
      <h1>〽️ Michigan Postseason 2026</h1>
      <p>NCAA Tournament & Big Ten Championship Tracker</p>
    </header>

    <nav>
      <button class="active" onclick="showSport('men-bb', event)">Men's Basketball</button>
      <button onclick="showSport('women-bb', event)">Women's Basketball</button>
      <button onclick="showSport('hockey', event)">Ice Hockey</button>
    </nav>

    <main id="content-area">
      <div class="loading">Loading tournament data...</div>
    </main>
    
    <footer>
      <p>Current Date: March 20, 2026 | Go Blue!</p>
    </footer>
  </div>
  <script src="script.js"></script>
</body>
</html>
